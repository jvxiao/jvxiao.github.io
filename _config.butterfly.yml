# --------------------------------------
# Hexo Butterfly Theme Configuration
# --------------------------------------

# --------------------------------------
# Navigation Settings
# --------------------------------------

nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: false

menu:
  首页: / || fas fa-home
  文章: /archives/ || fas fa-book
  生活: /categories/life/ || fas fa-coffee
  项目: /projects/ || fas fa-rocket
  关于: /about/ || fas fa-user

# Social media links
social:
  GitHub: https://github.com/jvxiao || fab fa-github || '#24292e'
  Twitter: https://www.x.com/jvxiao_me || fab fa-twitter || '#1da1f2'

# --------------------------------------
# Code Blocks Settings
# --------------------------------------

code_blocks:
  theme: light
  macStyle: false
  height_limit: false
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# --------------------------------------
# Image Settings
# --------------------------------------

favicon: /img/favicon.png

avatar:
  img: /img/avatar.png
  effect: true

disable_top_img: true

default_top_img:

index_img:

archive_img:

tag_img:

tag_per_img:

category_img:

category_per_img:

footer_img: false

background:

cover:
  index_enable: false
  aside_enable: true
  archives_enable: true
  default_cover:

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

error_404:
  enable: true
  subtitle: '页面未找到'
  background: /img/error-page.png

post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# Index page settings
# --------------------------------------

index_site_info_top:

index_top_img_height:

subtitle:
  enable: true
  effect: true
  typed_option:
  source: false
  sub:
    - 从初级到资深：大前端开发者的进阶笔记本

index_layout: 3

index_post_content:
  method: 3
  length: 500

# --------------------------------------
# Post Settings
# --------------------------------------

toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false

post_edit:
  enable: false
  url:

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

noticeOutdate:
  enable: false

# --------------------------------------
# Footer Settings
# --------------------------------------

footer:
  nav:
  owner:
    enable: true
    since: 2025
  copyright:
    enable: true
    version: true
  custom_text:

# --------------------------------------
# Aside Settings
# --------------------------------------

aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 全栈前端开发者 | Vue & Node.js
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/jvxiao
  card_announcement:
    enable: false
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_newest_comments:
    enable: false
    sort_order:
    limit: 6
    storage: 10
    avatar: true
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 40
    color: false
    custom_colors:
    orderby: random
    order: 1
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
    sort_order:
  card_post_series:
    enable: true
    series_title: false
    orderBy: 'date'
    order: -1
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:
    runtime_date:

# --------------------------------------
# Bottom right button
# --------------------------------------

rightside_bottom:

translate:
  enable: false

readmode: true

darkmode:
  enable: true
  button: true
  autoChangeMode: false
  start:
  end:

rightside_scroll_percent: false

rightside_item_order:
  enable: false

rightside_config_animation: true

# --------------------------------------
# Global Settings
# --------------------------------------

anchor:
  auto_update: false
  click_to_scroll: false

photofigcaption: false

copy:
  enable: true
  copyright:
    enable: false
    limit_count: 150

wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# Math
# --------------------------------------

math:
  use:
  per_page: true

# --------------------------------------
# Search
# --------------------------------------

search:
  use: local_search
  placeholder: 搜索文章...

  local_search:
    preload: false
    top_n_per_article: 1
    unescape: false
    pagination:
      enable: false
      hitsPerPage: 8
    CDN:

# --------------------------------------
# Share System
# --------------------------------------

share:
  use: sharejs
  sharejs:
    sites: facebook,x,wechat,weibo,qq

# --------------------------------------
# Comments System
# --------------------------------------

comments:
  use: Disqus
  text: true
  lazyload: false
  count: false
  card_post_count: false

disqus:
  shortname: jvxiao
  apikey:

# --------------------------------------
# Chat Services
# --------------------------------------

chat:
  use:
  rightside_button: false
  button_hide_show: false

# --------------------------------------
# Analysis
# --------------------------------------

baidu_analytics:

google_analytics:
  G-SBWM2JEKZ8

cloudflare_analytics:

microsoft_clarity:

umami_analytics:
  enable: false
  serverURL:
  script_name: script.js
  website_id:
  option:
  UV_PV:
    site_uv: false
    site_pv: false
    page_pv: false
    token:

google_tag_manager:
  tag_id:

# --------------------------------------
# Advertisement
# --------------------------------------

google_adsense:
  enable: false

ad:

# --------------------------------------
# Verification
# --------------------------------------

site_verification:

# --------------------------------------
# Beautify / Effect
# --------------------------------------

theme_color:
  enable: true
  main: "#64748b"
  paginator: "#64748b"
  button_hover: "#c72f1c"
  text_selection: "#64748b"
  link_color: "#64748b"
  meta_color: "#6b7280"
  hr_color: "#e5e7eb"
  code_foreground: "#f47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#64748b"
  blockquote_padding_color: "#64748b"
  blockquote_background_color: "#f1f5f9"
  scrollbar_color: "#64748b"
  meta_theme_color_light: "ffffff"
  meta_theme_color_dark: "#1f2937"

category_ui: index
tag_ui: index

rounded_corners_ui: true

text_align_justify: false

mask:
  header: true
  footer: true

preloader:
  enable: false

enter_transitions: true

display_mode: light

beautify:
  enable: false

font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

blog_title_font:
  font_link:
  font_family:

hr_icon:
  enable: true

activate_power_mode:
  enable: false

canvas_ribbon:
  enable: false

canvas_fluttering_ribbon:
  enable: false

canvas_nest:
  enable: false

fireworks:
  enable: false

click_heart:
  enable: false

clickShowText:
  enable: false

# --------------------------------------
# Lightbox Settings
# --------------------------------------

lightbox: fancybox

# --------------------------------------
# Tag Plugins settings
# --------------------------------------

series:
  enable: false

abcjs:
  enable: false

mermaid:
  enable: false

chartjs:
  enable: false

note:
  style: flat
  icons: true
  border_radius: 3
  light_bg_offset: 0

# --------------------------------------
# Other Settings
# --------------------------------------

pjax:
  enable: false

aplayerInject:
  enable: false

snackbar:
  enable: false
  position: bottom-left

instantpage: false

lazyload:
  enable: false
  native: false
  field: site

pwa:
  enable: false

Open_Graph_meta:
  enable: true

structured_data:
  enable: false

css_prefix: true

inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
  bottom:
    - <script>document.addEventListener('DOMContentLoaded',()=>{const p=location.pathname;document.querySelectorAll('.menus_item a.site-page').forEach(a=>{const h=a.getAttribute('href');if(h&&h!=='/'&&p.startsWith(h))a.closest('.menus_item').classList.add('nav-active');if(h==='/'&&p==='/')a.closest('.menus_item').classList.add('nav-active')})});</script>

CDN:
  internal_provider: local
  third_party_provider: jsdelivr
  version: true